name: DynathiGA4Analytics
version: 1.0.0
main: nl.dynathismp.analytics.DynathiGA4Analytics
api-version: '1.21'
author: Jv420
website: https://dynathismp.nl
description: Sends safe DynathiSMP server statistics and webshop sales to Firebase GA4.
commands:
  dynathiga:
    description: Dynathi GA4 Analytics admin command
    usage: /dynathiga reload
    permission: dynathiga.admin
  dynathisale:
    description: Sends a DynathiSMP webshop sale event to Firebase GA4
    usage: /dynathisale <player> <product_id> <price> <currency> [order_id]
    permission: dynathiga.sale
permissions:
  dynathiga.admin:
    description: Allows reloading DynathiGA4Analytics
    default: op
  dynathiga.sale:
    description: Allows sending webshop sale analytics events
    default: op
